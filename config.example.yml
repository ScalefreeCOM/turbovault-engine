# TurboVault Project Configuration Example
# This is a PER-PROJECT configuration file
# Located at: projects/<project_name>/config.yml

# YAML is the single source of truth - edit this file, changes apply immediately!

# ============================================================================
# Project Metadata
# ============================================================================
project:
  name: "customer_mdm"
  description: "Customer Master Data Management Data Vault"

# ============================================================================
# Source Metadata Import (Optional)
# ============================================================================
# Uncomment to import source metadata from Excel or SQLite:
# source:
#   type: excel
#   path: ./metadata/sources.xlsx
#
# source:
#   type: sqlite
#   path: ./metadata/sources.db

# ============================================================================
# Data Vault Configuration
# ============================================================================
configuration:
  # Schema names (REQUIRED)
  stage_schema: "stage"
  rdv_schema: "rdv"

  # Database names (optional - uses default connection if not specified)
  stage_database: "raw_vault"
  rdv_database: "core_vault"

  # Naming patterns (optional - uses defaults if not specified)
  # Placeholders: {entity_name} will be replaced with actual entity name
  hashdiff_naming: "hd_{entity_name}"
  hashkey_naming: "hk_{entity_name}"
  satellite_v0_naming: "sat_{entity_name}_v0"
  satellite_v1_naming: "sat_{entity_name}_v1"

# ============================================================================
# Output Configuration (all fields optional)
# ============================================================================
# By default, turbovault generate uses convention-based output directories:
#
#   exports/dbt_project/   ← generated dbt project (--type dbt)
#   exports/json/          ← JSON exports          (--type json)
#   exports/dbml/          ← DBML / ER diagrams    (--type dbml)
#
# Override any path below. Both relative and absolute paths are supported.
# Priority: CLI flag (--output / --json-output / --dbml-output)
#           > config value below
#           > convention default above
#
output:
  # General options
  create_zip: false       # Create a ZIP archive of the generated dbt project
  export_sources: true    # Include source system definitions in JSON export

  # Optional output path overrides (comment out to use convention defaults):
  # dbt_project_dir: "./custom/dbt_output"
  # json_output_dir: "./custom/json_exports"
  # dbml_output_dir: "./custom/dbml_exports"

# ============================================================================
# Minimal Valid Config
# ============================================================================
# The absolute minimum you need to get started:
#
# project:
#   name: "my_project"
#
# configuration:
#   stage_schema: "stage"
#   rdv_schema: "rdv"

# ============================================================================
# Notes
# ============================================================================
# - YAML is the source of truth (not stored in database)
# - Edit this file anytime - changes apply immediately on the next run
# - No restart or reload needed
# - Database config is in turbovault.yml (workspace-level), not here
# - See docs/configuration.md for complete documentation
